<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Puppet</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    #canvas-area {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    #canvas-area canvas { display: block; }

    /* ローディングオーバーレイ */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 26, 46, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #e94560;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #loading-overlay.visible { opacity: 1; pointer-events: auto; }
    #loading-overlay::before {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid #e94560;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 吹き出し */
    #speech-bubble {
      position: absolute;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #333;
      padding: 12px 20px;
      border-radius: 16px;
      font-size: 1.1rem;
      max-width: 70%;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #speech-bubble.visible { opacity: 1; }
    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      border: 10px solid transparent;
      border-top-color: #fff;
    }

    /* サイドパネル */
    #panel {
      width: 220px;
      background: #16213e;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #panel h3 {
      font-size: 0.85rem;
      color: #8899aa;
      border-bottom: 1px solid #2a3a5a;
      padding-bottom: 4px;
    }
    .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .btn-group button {
      flex: 1 1 45%;
      padding: 10px 4px;
      border: 1px solid #3a4a6a;
      border-radius: 8px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-group button:hover { background: #2a2a4e; border-color: #6a7aba; }
    .btn-group button.active { background: #0f3460; border-color: #e94560; }

    /* アップロード */
    #upload-label {
      display: block;
      text-align: center;
      padding: 12px;
      border: 2px dashed #3a4a6a;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #upload-label:hover { border-color: #e94560; }
    #upload-input { display: none; }

    /* 背景除去トグル */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.8rem;
      color: #aabbcc;
    }
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #3a4a6a;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 18px;
      height: 18px;
      background: #e0e0e0;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #e94560;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* スマホ対応 */
    @media (max-width: 640px) {
      body { flex-direction: column; }
      #canvas-area { height: 60vh; }
      #panel {
        width: 100%;
        height: 40vh;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-start;
        overflow-y: auto;
      }
      #panel > * { flex: 1 1 45%; min-width: 140px; }
    }
  </style>
</head>
<body>
  <div id="canvas-area">
    <div id="loading-overlay"></div>
    <div id="speech-bubble"></div>
  </div>
  <div id="panel">
    <div>
      <label id="upload-label" for="upload-input">📁 画像を選択</label>
      <input id="upload-input" type="file" accept="image/png,image/jpeg,image/webp" />
      <div class="toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="bg-removal-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
        <span>背景を自動除去</span>
      </div>
    </div>
    <div>
      <h3>── 表情 ──</h3>
      <div class="btn-group" id="expression-btns">
        <button data-expr="neutral">😐 通常</button>
        <button data-expr="happy">😊 笑顔</button>
        <button data-expr="angry">😠 怒り</button>
        <button data-expr="surprised">😲 驚き</button>
      </div>
    </div>
    <div>
      <h3>── ポーズ ──</h3>
      <div class="btn-group" id="pose-btns">
        <button data-pose="stand">🧍 直立</button>
        <button data-pose="wave">👋 手振り</button>
        <button data-pose="bow">🙇 お辞儀</button>
      </div>
    </div>
    <div>
      <h3>── セリフ ──</h3>
      <div class="btn-group" id="speech-btns">
        <button data-speech="greet">挨拶</button>
        <button data-speech="angry">怒る</button>
        <button data-speech="bye">別れ</button>
        <button data-speech="think">悩む</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
